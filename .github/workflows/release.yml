name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gates
        run: |
          bun run lint
          bun run format:check
          bun run typecheck
          bun run test

      - name: Build Windows executable
        run: bun run build

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: XantaTTS ${{ steps.version.outputs.tag }}
          body: |
            ## XantaTTS ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `XantaTTS.exe` below
            2. Place it in a folder with your `.env` file
            3. Double-click to launch

            ### What's New
            See [CHANGELOG.md](https://github.com/Panthaweekan/tts/blob/main/CHANGELOG.md) for full details.
          files: XantaTTS.exe
          draft: false
          prerelease: false
